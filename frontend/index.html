<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master of Puppets</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            min-height: 100vh;
        }
        header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 1.2rem 2rem;
            border-bottom: 2px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        header h1 {
            font-size: 1.4rem;
            color: #e94560;
            font-weight: 700;
        }
        header span {
            color: #888;
            font-size: 0.85rem;
        }
        .container {
            display: flex;
            height: calc(100vh - 62px);
        }
        .sidebar {
            width: 340px;
            min-width: 260px;
            background: #13151b;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
        }
        .sidebar h2 {
            padding: 1rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #888;
            border-bottom: 1px solid #222;
        }
        .pipeline-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        .pipeline-item {
            padding: 0.6rem 0.8rem;
            margin-bottom: 2px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            transition: background 0.15s;
            word-break: break-all;
        }
        .pipeline-item:hover { background: #1e2030; }
        .pipeline-item.active {
            background: #1a2744;
            color: #5b9aff;
            font-weight: 600;
        }
        .pipeline-item .ext {
            display: inline-block;
            font-size: 0.7rem;
            padding: 1px 5px;
            border-radius: 3px;
            margin-right: 6px;
            font-weight: 700;
        }
        .ext-slp { background: #0f3460; color: #5b9aff; }
        .ext-slt { background: #2d1a45; color: #c77dff; }
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .content-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #222;
            font-size: 0.9rem;
            color: #aaa;
        }
        .content-header strong { color: #e0e0e0; }
        .json-view {
            flex: 1;
            overflow: auto;
            padding: 1.5rem;
        }
        .json-view pre {
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 0.82rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #555;
            font-size: 1.1rem;
        }
        .loading { color: #5b9aff; }
        .error { color: #e94560; }

        /* JSON syntax highlighting */
        .json-key { color: #5b9aff; }
        .json-string { color: #98c379; }
        .json-number { color: #d19a66; }
        .json-bool { color: #c678dd; }
        .json-null { color: #888; }
    </style>
</head>
<body>
    <header>
        <h1>Master of Puppets</h1>
        <span>SnapLogic Pipeline Viewer</span>
    </header>
    <div class="container">
        <aside class="sidebar">
            <h2>Pipelines &amp; Tasks</h2>
            <div class="pipeline-list" id="pipelineList">
                <div class="placeholder">Loading...</div>
            </div>
        </aside>
        <main class="content">
            <div class="content-header" id="contentHeader">
                Select a pipeline from the list
            </div>
            <div class="json-view" id="jsonView">
                <div class="placeholder">← Choose a pipeline to view its JSON</div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = '/api';

        function syntaxHighlight(json) {
            const str = JSON.stringify(json, null, 2);
            return str.replace(
                /("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
                function (match) {
                    let cls = 'json-number';
                    if (/^"/.test(match)) {
                        cls = /:$/.test(match) ? 'json-key' : 'json-string';
                    } else if (/true|false/.test(match)) {
                        cls = 'json-bool';
                    } else if (/null/.test(match)) {
                        cls = 'json-null';
                    }
                    return '<span class="' + cls + '">' + match + '</span>';
                }
            );
        }

        async function loadPipelines() {
            const list = document.getElementById('pipelineList');
            try {
                const res = await fetch(`${API_BASE}/pipelines`);
                const pipelines = await res.json();
                if (pipelines.length === 0) {
                    list.innerHTML = '<div class="placeholder">No pipelines found</div>';
                    return;
                }
                list.innerHTML = '';
                pipelines.forEach(name => {
                    const item = document.createElement('div');
                    item.className = 'pipeline-item';
                    const ext = name.split('.').pop();
                    const extClass = ext === 'slp' ? 'ext-slp' : 'ext-slt';
                    item.innerHTML = `<span class="ext ${extClass}">${ext.toUpperCase()}</span>${name}`;
                    item.addEventListener('click', () => selectPipeline(name, item));
                    list.appendChild(item);
                });
            } catch (e) {
                list.innerHTML = `<div class="placeholder error">Failed to load pipelines</div>`;
            }
        }

        async function selectPipeline(name, element) {
            document.querySelectorAll('.pipeline-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            const header = document.getElementById('contentHeader');
            const view = document.getElementById('jsonView');

            header.innerHTML = `Viewing: <strong>${escapeHtml(name)}</strong>`;
            view.innerHTML = '<div class="placeholder loading">Loading...</div>';

            try {
                const res = await fetch(`${API_BASE}/pipelines/${encodeURIComponent(name)}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                view.innerHTML = `<pre>${syntaxHighlight(data)}</pre>`;
            } catch (e) {
                view.innerHTML = `<div class="placeholder error">Error: ${escapeHtml(e.message)}</div>`;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadPipelines();
    </script>
</body>
</html>
