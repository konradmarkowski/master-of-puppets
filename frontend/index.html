<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master of Puppets</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }
        header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 0.9rem 2rem; border-bottom: 2px solid #0f3460; display: flex; align-items: center; gap: 1rem; }
        header h1 { font-size: 1.3rem; color: #e94560; font-weight: 700; }
        header span { color: #888; font-size: 0.85rem; }
        .container { display: flex; height: calc(100vh - 50px); }

        /* ── Sidebar ── */
        .sidebar { width: 270px; min-width: 200px; background: #13151b; border-right: 1px solid #222; display: flex; flex-direction: column; }
        .sidebar h2 { padding: 0.7rem 1rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #888; border-bottom: 1px solid #222; }
        .pipeline-list { flex: 1; overflow-y: auto; padding: 0.3rem; }
        .pipeline-item { padding: 0.3rem 0.5rem 0.3rem 0; margin-bottom: 1px; border-radius: 5px; cursor: pointer; font-size: 0.72rem; font-family: 'Cascadia Code','Fira Code',monospace; transition: background .15s; word-break: break-all; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pipeline-item:hover { background: #1e2030; }
        .pipeline-item.active { background: #1a2744; color: #5b9aff; font-weight: 600; }
        .ext { display: inline-block; font-size: 0.58rem; padding: 1px 4px; border-radius: 3px; margin-right: 3px; font-weight: 700; }
        .ext-slp { background: #0f3460; color: #5b9aff; }
        .ext-slt { background: #2d1a45; color: #c77dff; }

        /* ── Folder tree ── */
        .folder { margin-bottom: 1px; }
        .folder-header { display: flex; align-items: center; gap: 4px; padding: 0.35rem 0.5rem; border-radius: 5px; cursor: pointer; font-size: 0.74rem; font-weight: 600; color: #999; transition: background .15s; user-select: none; }
        .folder-header:hover { background: #1e2030; color: #ccc; }
        .folder-arrow { font-size: 0.6rem; width: 12px; text-align: center; transition: transform .15s; color: #555; }
        .folder-arrow.open { transform: rotate(90deg); }
        .folder-icon { font-size: 0.8rem; }
        .folder-children { padding-left: 0.7rem; overflow: hidden; }
        .folder-children.collapsed { display: none; }
        .folder-count { font-size: 0.6rem; color: #444; margin-left: auto; }

        /* ── Main area ── */
        .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .main-header { padding: 0.5rem 1.2rem; border-bottom: 1px solid #222; font-size: 0.85rem; color: #aaa; display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
        .main-header strong { color: #e0e0e0; }
        .pipeline-notes { color: #666; font-size: 0.78rem; font-style: italic; }

        /* ── Tabs ── */
        .tab-bar { display: flex; border-bottom: 1px solid #222; flex-shrink: 0; background: #13151b; }
        .tab-btn { padding: 0.5rem 1.2rem; cursor: pointer; background: transparent; border: none; color: #888; font-size: 0.82rem; border-bottom: 2px solid transparent; transition: all .15s; }
        .tab-btn:hover { color: #ccc; background: #1a1d26; }
        .tab-btn.active { color: #5b9aff; border-bottom-color: #5b9aff; }
        .tab-btn.active-dev { color: #4caf50; border-bottom-color: #4caf50; }

        .main-body { flex: 1; display: flex; overflow: hidden; position: relative; }
        .tab-content { display: none; flex: 1; overflow: hidden; }
        .tab-content.active { display: flex; }

        /* ── Graph canvas ── */
        .graph-area { flex: 1; overflow: hidden; position: relative; background: #0d0f14; cursor: grab; }
        .graph-area.grabbing { cursor: grabbing; }
        .graph-area svg { width: 100%; height: 100%; }

        /* ── Detail panel ── */
        .detail-panel { width: 360px; max-width: 38vw; background: #13151b; border-left: 1px solid #222; overflow-y: auto; padding: 1rem; display: none; flex-direction: column; gap: 0.7rem; flex-shrink: 0; }
        .detail-panel.open { display: flex; }
        .detail-panel h3 { font-size: 0.95rem; color: #5b9aff; border-bottom: 1px solid #222; padding-bottom: 0.4rem; }
        .detail-close { float: right; cursor: pointer; color: #888; font-size: 1.1rem; background: none; border: none; padding: 2px 6px; }
        .detail-close:hover { color: #e94560; }
        .detail-row { margin-bottom: 0.5rem; }
        .detail-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em; color: #555; margin-bottom: 2px; }
        .detail-value { font-size: 0.8rem; color: #ccc; line-height: 1.5; }
        .detail-value code { background: #1a1d26; padding: 1px 4px; border-radius: 3px; font-family: 'Cascadia Code','Fira Code',monospace; font-size: 0.75rem; }
        .detail-value pre { background: #1a1d26; padding: 0.5rem; border-radius: 5px; font-family: 'Cascadia Code','Fira Code',monospace; font-size: 0.72rem; overflow-x: auto; white-space: pre-wrap; line-height: 1.5; color: #bbb; }
        .mapping-table { width: 100%; border-collapse: collapse; font-size: 0.72rem; }
        .mapping-table th { text-align: left; padding: 3px 5px; color: #888; border-bottom: 1px solid #333; font-weight: 600; }
        .mapping-table td { padding: 2px 5px; border-bottom: 1px solid #1e2030; color: #aaa; word-break: break-all; }
        .mapping-table td code { background: #1a1d26; padding: 1px 3px; border-radius: 2px; font-size: 0.7rem; }
        .badge { display: inline-block; font-size: 0.62rem; padding: 2px 6px; border-radius: 3px; font-weight: 700; margin-right: 4px; }

        /* ── Node / edge styling ── */
        .node-box { rx: 8; ry: 8; stroke-width: 2; }
        .cat-Transform { fill: #162040; stroke: #3b6fcf; }
        .cat-Flow { fill: #1a2e1a; stroke: #4caf50; }
        .cat-Database { fill: #2d1a45; stroke: #9c27b0; }
        .cat-REST { fill: #2d2a15; stroke: #ff9800; }
        .cat-Read { fill: #15292d; stroke: #00bcd4; }
        .cat-Write { fill: #2d1520; stroke: #e91e63; }
        .cat-Cloud { fill: #152d2a; stroke: #26a69a; }
        .cat-Script { fill: #2d2515; stroke: #cddc39; }
        .cat-Unknown { fill: #1e1e1e; stroke: #666; }
        .node-group { cursor: pointer; }
        .node-group:hover .node-box { filter: brightness(1.3); }
        .node-group.selected .node-box { stroke-width: 3; filter: brightness(1.4); }
        .edge-normal { stroke: #3a4060; stroke-width: 2; fill: none; marker-end: url(#arrow); }
        .edge-error { stroke: #c0392b; stroke-width: 2; fill: none; stroke-dasharray: 6,3; marker-end: url(#arrow-error); }
        .node-label { fill: #ddd; font-size: 11px; font-family: 'Segoe UI',system-ui,sans-serif; pointer-events: none; }
        .node-type-label { fill: #777; font-size: 9px; font-family: 'Segoe UI',system-ui,sans-serif; pointer-events: none; }

        /* ── Zoom controls ── */
        .zoom-controls { position: absolute; bottom: 12px; right: 12px; display: flex; gap: 4px; z-index: 10; }
        .zoom-btn { width: 30px; height: 30px; border: 1px solid #333; background: #1a1d26; color: #aaa; border-radius: 6px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
        .zoom-btn:hover { background: #252830; color: #fff; }

        /* ── Developer View ── */
        .dev-view { flex: 1; display: flex; overflow: hidden; }
        .dev-steps { flex: 1; overflow-y: auto; padding: 1.5rem 2rem; }
        .dev-sidebar { width: 360px; max-width: 38vw; background: #13151b; border-left: 1px solid #222; overflow-y: auto; padding: 1rem; display: none; flex-direction: column; gap: 0.7rem; flex-shrink: 0; }
        .dev-sidebar.open { display: flex; }

        .dev-stats { display: flex; gap: 0.8rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .stat-card { background: #161820; border: 1px solid #222; border-radius: 8px; padding: 0.6rem 1rem; min-width: 100px; }
        .stat-num { font-size: 1.4rem; font-weight: 700; color: #5b9aff; }
        .stat-label { font-size: 0.68rem; color: #666; text-transform: uppercase; letter-spacing: 0.04em; }

        .dev-section { margin-bottom: 1.5rem; }
        .dev-section h3 { font-size: 0.85rem; color: #888; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.6rem; border-bottom: 1px solid #1e2030; padding-bottom: 0.3rem; }

        .step-card { background: #161820; border: 1px solid #222; border-radius: 10px; padding: 1rem 1.2rem; margin-bottom: 0.6rem; cursor: pointer; transition: all .15s; display: flex; gap: 1rem; align-items: flex-start; }
        .step-card:hover { border-color: #3a4060; background: #1a1d26; }
        .step-card.selected { border-color: #4caf50; background: #1a2e1a; }
        .step-num { width: 32px; height: 32px; border-radius: 50%; background: #1a2744; color: #5b9aff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; }
        .step-icon { font-size: 1.1rem; margin-right: 2px; }
        .step-body { flex: 1; min-width: 0; }
        .step-title { font-size: 0.88rem; font-weight: 600; color: #ddd; margin-bottom: 3px; }
        .step-summary { font-size: 0.78rem; color: #888; line-height: 1.4; }
        .step-snap-badge { font-size: 0.62rem; padding: 1px 5px; border-radius: 3px; background: #222; color: #666; margin-top: 4px; display: inline-block; }
        .step-connector { width: 2px; height: 12px; background: #333; margin: 0 0 0 15px; }

        .info-box { background: #161820; border: 1px solid #222; border-radius: 8px; padding: 0.8rem 1rem; font-size: 0.78rem; color: #999; line-height: 1.5; }
        .info-box strong { color: #ccc; }
        .info-box ul { margin: 0.3rem 0 0.3rem 1.2rem; }
        .info-box li { margin-bottom: 0.2rem; }

        /* ── Task view ── */
        .task-view { padding: 2rem; overflow-y: auto; flex: 1; }
        .task-card { background: #161820; border: 1px solid #222; border-radius: 10px; padding: 1.5rem; max-width: 600px; }
        .task-card h3 { color: #c77dff; margin-bottom: 1rem; }

        /* ── Placeholder ── */
        .placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: #444; font-size: 1rem; }
        .loading { color: #5b9aff; }
        .error-msg { color: #e94560; }

        /* ── Dev detail panel ── */
        .dev-detail h3 { color: #4caf50; }
        .pseudo-block { background: #0d1117; border: 1px solid #1e2030; border-radius: 6px; padding: 0.8rem; font-family: 'Cascadia Code','Fira Code',monospace; font-size: 0.76rem; color: #8cc265; line-height: 1.6; white-space: pre-wrap; overflow-x: auto; }

        /* ── Global view tabs ── */
        .global-tabs { display: flex; gap: 2px; margin-left: auto; }
        .global-tab { background: none; border: none; color: #666; font-size: 0.82rem; padding: 0.3rem 0.9rem; border-radius: 5px; cursor: pointer; transition: all .15s; }
        .global-tab:hover { color: #ccc; background: #1a1d26; }
        .global-tab.active { color: #e94560; background: #1a1a2e; font-weight: 600; }

        /* ── Landscape view ── */
        #landscapeView { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        #landscapeView.active { display: flex; }
        .ls-toolbar { padding: 0.5rem 1rem; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 1rem; background: #13151b; flex-shrink: 0; }
        .ls-toolbar label { font-size: 0.75rem; color: #888; }
        .ls-toolbar select, .ls-toolbar input[type=checkbox] { accent-color: #e94560; }
        .ls-toolbar select { background: #1a1d26; border: 1px solid #333; color: #ccc; padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; }
        .ls-stats { margin-left: auto; font-size: 0.72rem; color: #555; }
        .ls-wrap { flex: 1; position: relative; overflow: hidden; background: #0d0f14; }
        .ls-wrap svg { width: 100%; height: 100%; }
        .ls-legend { position: absolute; bottom: 10px; left: 10px; background: #13151bee; border: 1px solid #222; border-radius: 8px; padding: 0.6rem 0.9rem; font-size: 0.68rem; z-index: 10; max-height: 50vh; overflow-y: auto; }
        .ls-legend-title { font-weight: 700; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
        .ls-legend-row { display: flex; align-items: center; gap: 6px; padding: 2px 0; color: #aaa; }
        .ls-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .ls-detail-panel { position: absolute; top: 0; right: 0; width: 340px; height: 100%; background: #13151b; border-left: 1px solid #222; overflow-y: auto; padding: 1rem; font-size: 0.78rem; z-index: 10; display: none; }
        .ls-detail-panel.open { display: block; }
        .ls-detail-panel h3 { font-size: 0.95rem; color: #e94560; border-bottom: 1px solid #222; padding-bottom: 0.4rem; margin-bottom: 0.6rem; }
        .ls-node circle { cursor: pointer; transition: all .15s; }
        .ls-node circle:hover { filter: brightness(1.4); }
        .ls-node text { font-size: 9px; fill: #bbb; pointer-events: none; font-family: 'Segoe UI', system-ui, sans-serif; }
        .ls-edge { fill: none; stroke-opacity: 0.4; }
        .ls-edge:hover { stroke-opacity: 1; stroke-width: 2.5; }
        .ls-edge.task-edge { stroke-dasharray: 5,3; }
    </style>
</head>
<body>
    <header>
        <h1>Master of Puppets</h1>
        <span>SnapLogic Pipeline Explorer</span>
        <div class="global-tabs">
            <button class="global-tab active" data-view="pipelines">Pipelines</button>
            <button class="global-tab" data-view="landscape">Landscape</button>
        </div>
    </header>
    <div class="container" id="pipelinesView">
        <aside class="sidebar">
            <h2>Pipelines &amp; Tasks</h2>
            <div class="pipeline-list" id="pipelineList"><div class="placeholder">Loading...</div></div>
        </aside>
        <div class="main-area">
            <div class="main-header" id="mainHeader">Select a pipeline from the list</div>
            <div class="tab-bar" id="tabBar" style="display:none">
                <button class="tab-btn active" data-tab="graph" id="tabGraph">Pipeline Graph</button>
                <button class="tab-btn" data-tab="dev" id="tabDev">Developer View</button>
            </div>
            <div class="main-body" id="mainBody">
                <div class="placeholder" style="flex:1">&#8592; Choose a pipeline to explore</div>
            </div>
        </div>
    </div>

    <!-- ── Landscape View ── -->
    <div id="landscapeView">
        <div class="ls-toolbar">
            <label>Project:</label>
            <select id="lsProjectFilter"><option value="__all__">All projects</option></select>
            <label><input type="checkbox" id="lsShowTasks" checked/> Tasks</label>
            <label><input type="checkbox" id="lsShowExternal" checked/> External refs</label>
            <span class="ls-stats" id="lsStats"></span>
        </div>
        <div class="ls-wrap" id="lsWrap">
            <svg id="lsSvg"></svg>
            <div class="ls-legend" id="lsLegend"></div>
            <div class="ls-detail-panel" id="lsDetailPanel">
                <button class="detail-close" onclick="closeLsDetail()">&times;</button>
                <div id="lsDetailContent"></div>
            </div>
        </div>
    </div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const API = '/api';
// ── Graph constants ──
const NODE_W = 180, NODE_H = 56, GRID_X = 220, GRID_Y = 110, PAD = 80;
let currentParsed = null, currentSimplified = null, currentName = '';
let panState = null, svgEl = null, gWorld = null;
let transform = { x: 0, y: 0, k: 1 };

// ════════════════════════════════ Sidebar ════════════════════════════════
async function loadPipelines() {
    const list = document.getElementById('pipelineList');
    try {
        const res = await fetch(`${API}/pipelines`);
        const tree = await res.json();
        if (!tree.length) { list.innerHTML = '<div class="placeholder">No pipelines</div>'; return; }
        list.innerHTML = '';
        renderTree(tree, list, 0);
    } catch { list.innerHTML = '<div class="placeholder error-msg">Failed to load</div>'; }
}

function renderTree(nodes, container, depth) {
    nodes.forEach(node => {
        if (node.type === 'folder') {
            const folder = document.createElement('div');
            folder.className = 'folder';
            const fileCount = countFiles(node);
            const header = document.createElement('div');
            header.className = 'folder-header';
            header.style.paddingLeft = (depth * 0.7 + 0.3) + 'rem';
            header.innerHTML = `<span class="folder-arrow open">&#9654;</span><span class="folder-icon">&#128194;</span>${esc(node.name)}<span class="folder-count">${fileCount}</span>`;
            const children = document.createElement('div');
            children.className = 'folder-children';
            header.addEventListener('click', () => {
                children.classList.toggle('collapsed');
                header.querySelector('.folder-arrow').classList.toggle('open');
            });
            folder.appendChild(header);
            renderTree(node.children, children, depth + 1);
            folder.appendChild(children);
            container.appendChild(folder);
        } else {
            const el = document.createElement('div');
            el.className = 'pipeline-item';
            el.style.paddingLeft = (depth * 0.7 + 0.5) + 'rem';
            el.innerHTML = `<span class="ext ext-${node.ext}">${node.ext.toUpperCase()}</span>${esc(node.name)}`;
            el.title = node.path;
            el.dataset.filePath = node.path;
            el.addEventListener('click', () => selectPipeline(node.path, el));
            container.appendChild(el);
        }
    });
}

function countFiles(node) {
    if (node.type === 'file') return 1;
    return (node.children || []).reduce((s, c) => s + countFiles(c), 0);
}

async function selectPipeline(filePath, el) {
    document.querySelectorAll('.pipeline-item').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    currentName = filePath;
    const displayName = filePath.split('/').pop();
    const header = document.getElementById('mainHeader');
    const body = document.getElementById('mainBody');
    const tabBar = document.getElementById('tabBar');
    header.innerHTML = `<strong>${esc(displayName)}</strong> <span style="color:#555;font-size:0.72rem">${esc(filePath)}</span>`;
    body.innerHTML = '<div class="placeholder loading" style="flex:1">Loading...</div>';
    tabBar.style.display = 'none';

    const encodedPath = filePath.split('/').map(encodeURIComponent).join('/');
    const ext = filePath.split('.').pop();
    try {
        if (ext === 'slt') {
            const res = await fetch(`${API}/pipelines/${encodedPath}/parsed`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            renderTask(data, header, body);
        } else {
            const [parsedRes, simplifiedRes] = await Promise.all([
                fetch(`${API}/pipelines/${encodedPath}/parsed`),
                fetch(`${API}/pipelines/${encodedPath}/simplified`)
            ]);
            if (!parsedRes.ok || !simplifiedRes.ok) throw new Error('Failed to load pipeline');
            currentParsed = await parsedRes.json();
            currentSimplified = await simplifiedRes.json();
            const meta = currentParsed.metadata || {};
            let hdr = `<strong>${esc(displayName)}</strong> <span style="color:#555;font-size:0.72rem">${esc(filePath)}</span>`;
            if (meta.notes) hdr += `<br><span class="pipeline-notes">${esc(meta.notes)}</span>`;
            header.innerHTML = hdr;
            tabBar.style.display = 'flex';
            showTab('graph');
        }
    } catch (e) {
        body.innerHTML = `<div class="placeholder error-msg" style="flex:1">${esc(e.message)}</div>`;
    }
}

// ════════════════════════════════ Tab switching ════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => showTab(btn.dataset.tab));
});

function showTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active', 'active-dev'); });
    if (tab === 'graph') {
        document.getElementById('tabGraph').classList.add('active');
        renderGraphTab();
    } else {
        document.getElementById('tabDev').classList.add('active-dev');
        renderDevTab();
    }
}

// ════════════════════════════════ Task rendering ════════════════════════════════
function renderTask(data, header, body) {
    header.innerHTML = `<strong>${esc(data.jobName || 'Task')}</strong> <span class="badge" style="background:#2d1a45;color:#c77dff">TASK</span>`;
    const p = data.parameters || {}, s = data.schedule || {};
    body.innerHTML = `<div class="task-view"><div class="task-card">
        <h3>${esc(data.jobName || '')}</h3>
        <div class="detail-row"><div class="detail-label">Trigger Type</div><div class="detail-value">${esc(data.triggerType || '-')}</div></div>
        <div class="detail-row"><div class="detail-label">Pipeline</div><div class="detail-value"><code>${esc(p.pipeline_path || '-')}</code></div></div>
        <div class="detail-row"><div class="detail-label">Snaplex</div><div class="detail-value"><code>${esc(p.snaplex_path || '-')}</code></div></div>
        <div class="detail-row"><div class="detail-label">Schedule</div><div class="detail-value">${esc(s.start_date||'')} ${esc(s.start_time||'')} (${esc(s.time_zone||'')})<br>Repeat every ${s.repeat?.every||'?'} ${s.repeat?.by||''}</div></div>
        <div class="detail-row"><div class="detail-label">Enabled</div><div class="detail-value">${p.enabled ? 'Yes' : 'No'}</div></div>
        ${data.note ? `<div class="detail-row"><div class="detail-label">Note</div><div class="detail-value">${esc(data.note)}</div></div>` : ''}
    </div></div>`;
}

// ════════════════════════════════ Graph Tab ════════════════════════════════
function renderGraphTab() {
    const body = document.getElementById('mainBody');
    body.innerHTML = `
        <div class="tab-content active" id="graphTabContent" style="display:flex;flex:1;">
            <div class="graph-area" id="graphArea">
                <svg id="graphSvg">
                    <defs>
                        <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#3a4060"/></marker>
                        <marker id="arrow-error" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#c0392b"/></marker>
                    </defs>
                    <g id="world"></g>
                </svg>
                <div class="zoom-controls">
                    <button class="zoom-btn" onclick="zoomBy(1.3)" title="Zoom in">+</button>
                    <button class="zoom-btn" onclick="zoomBy(0.77)" title="Zoom out">&minus;</button>
                    <button class="zoom-btn" onclick="zoomFit()" title="Fit">&#8689;</button>
                </div>
            </div>
            <div class="detail-panel" id="detailPanel"></div>
        </div>`;
    svgEl = document.getElementById('graphSvg');
    gWorld = document.getElementById('world');
    transform = { x: PAD, y: PAD, k: 1 };
    drawGraph(currentParsed);
    setupPanZoom();
    setTimeout(zoomFit, 50);
}

function drawGraph(data) {
    gWorld.innerHTML = '';
    const nodePositions = {};
    data.nodes.forEach(n => {
        nodePositions[n.id] = { x: n.gridX * GRID_X, y: n.gridY * GRID_Y };
    });
    // Edges
    data.edges.forEach(e => {
        const src = nodePositions[e.source], dst = nodePositions[e.target];
        if (!src || !dst) return;
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', edgePath(src, dst));
        path.setAttribute('class', e.isError ? 'edge-error' : 'edge-normal');
        path.dataset.edgeId = e.id; path.dataset.src = e.source; path.dataset.dst = e.target;
        gWorld.appendChild(path);
    });
    // Nodes
    data.nodes.forEach(n => {
        const pos = nodePositions[n.id];
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.setAttribute('class', 'node-group');
        g.setAttribute('transform', `translate(${pos.x},${pos.y})`);
        g.dataset.nodeId = n.id;
        g.appendChild(svgNS('rect', { class: `node-box cat-${n.category||'Unknown'}`, x: -NODE_W/2, y: -NODE_H/2, width: NODE_W, height: NODE_H }));
        const label = svgNS('text', { class: 'node-label', x: 0, y: -4, 'text-anchor': 'middle' });
        label.textContent = truncate(n.label, 22);
        g.appendChild(label);
        const tl = svgNS('text', { class: 'node-type-label', x: 0, y: 12, 'text-anchor': 'middle' });
        tl.textContent = n.type;
        g.appendChild(tl);
        g.addEventListener('click', ev => { ev.stopPropagation(); showNodeDetail(n); document.querySelectorAll('.node-group').forEach(ng => ng.classList.remove('selected')); g.classList.add('selected'); });
        makeDraggable(g, nodePositions, n.id, data.edges);
        gWorld.appendChild(g);
    });
}

function edgePath(src, dst) {
    const sx = src.x, sy = src.y, dx = dst.x, dy = dst.y;
    const half = NODE_W / 2;
    if (Math.abs(sy - dy) < 15) {
        const mx = (sx + dx) / 2;
        return `M${sx+half},${sy} C${mx},${sy} ${mx},${dy} ${dx-half},${dy}`;
    }
    return `M${sx+half},${sy} C${sx+half+50},${sy} ${dx-half-50},${dy} ${dx-half},${dy}`;
}

function updateEdges(positions, edges) {
    edges.forEach(e => {
        const p = gWorld.querySelector(`[data-edge-id="${e.id}"]`);
        if (!p) return;
        const s = positions[e.source], d = positions[e.target];
        if (s && d) p.setAttribute('d', edgePath(s, d));
    });
}

function makeDraggable(g, positions, nodeId, edges) {
    let dragging = false, sm = null, sp = null;
    g.addEventListener('mousedown', ev => {
        if (ev.button !== 0) return;
        dragging = true; sm = { x: ev.clientX, y: ev.clientY }; sp = { ...positions[nodeId] };
        ev.stopPropagation();
        const onMove = e2 => {
            if (!dragging) return;
            positions[nodeId] = { x: sp.x + (e2.clientX - sm.x) / transform.k, y: sp.y + (e2.clientY - sm.y) / transform.k };
            g.setAttribute('transform', `translate(${positions[nodeId].x},${positions[nodeId].y})`);
            updateEdges(positions, edges);
        };
        const onUp = () => { dragging = false; window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
    });
}

function setupPanZoom() {
    const area = document.getElementById('graphArea');
    area.addEventListener('mousedown', ev => {
        if (ev.target.closest('.node-group') || ev.target.closest('.zoom-btn')) return;
        area.classList.add('grabbing');
        const start = { x: ev.clientX, y: ev.clientY, tx: transform.x, ty: transform.y };
        const onMove = e2 => { transform.x = start.tx + e2.clientX - start.x; transform.y = start.ty + e2.clientY - start.y; applyTransform(); };
        const onUp = () => { area.classList.remove('grabbing'); window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
    });
    area.addEventListener('wheel', ev => {
        ev.preventDefault();
        const f = ev.deltaY < 0 ? 1.12 : 0.89;
        const r = svgEl.getBoundingClientRect();
        const mx = ev.clientX - r.left, my = ev.clientY - r.top;
        transform.x = mx - (mx - transform.x) * f; transform.y = my - (my - transform.y) * f; transform.k *= f;
        applyTransform();
    }, { passive: false });
    area.addEventListener('click', ev => {
        if (!ev.target.closest('.node-group')) { document.querySelectorAll('.node-group').forEach(g => g.classList.remove('selected')); document.getElementById('detailPanel').classList.remove('open'); }
    });
}

function applyTransform() { gWorld.setAttribute('transform', `translate(${transform.x},${transform.y}) scale(${transform.k})`); }
function zoomBy(f) { const r = svgEl.getBoundingClientRect(); const cx = r.width/2, cy = r.height/2; transform.x = cx-(cx-transform.x)*f; transform.y = cy-(cy-transform.y)*f; transform.k *= f; applyTransform(); }
function zoomFit() {
    if (!currentParsed || !currentParsed.nodes.length) return;
    const r = svgEl.getBoundingClientRect();
    let mnX=Infinity,mxX=-Infinity,mnY=Infinity,mxY=-Infinity;
    currentParsed.nodes.forEach(n => { const x=n.gridX*GRID_X, y=n.gridY*GRID_Y; mnX=Math.min(mnX,x-NODE_W/2); mxX=Math.max(mxX,x+NODE_W/2); mnY=Math.min(mnY,y-NODE_H/2); mxY=Math.max(mxY,y+NODE_H/2); });
    const gW=mxX-mnX+PAD*2, gH=mxY-mnY+PAD*2;
    const k = Math.min(r.width/gW, r.height/gH, 1.5);
    transform.k = k; transform.x = (r.width-gW*k)/2-mnX*k+PAD*k; transform.y = (r.height-gH*k)/2-mnY*k+PAD*k;
    applyTransform();
}

function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function truncate(s, max) { return s && s.length > max ? s.substring(0, max-1) + '…' : (s||''); }
function row(label, value) { return `<div class="detail-row"><div class="detail-label">${label}</div><div class="detail-value">${value}</div></div>`; }
function svgNS(tag, attrs) { const el = document.createElementNS('http://www.w3.org/2000/svg', tag); for (const [k,v] of Object.entries(attrs)) el.setAttribute(k,v); return el; }

// ════════════════════════════════ Landscape ════════════════════════════════
let landscapeData = null;
const PROJECT_COLORS = [
    '#5b9aff','#4caf50','#ff9800','#e91e63','#c77dff','#00bcd4',
    '#cddc39','#26a69a','#f44336','#ffeb3b','#79c0ff','#d2a8ff',
];

async function loadLandscape() {
    const wrap = document.getElementById('lsWrap');
    const oldLoading = document.getElementById('lsLoading');
    if (oldLoading) oldLoading.remove();
    wrap.insertAdjacentHTML('afterbegin', '<div class="placeholder loading" id="lsLoading" style="position:absolute;inset:0;z-index:5">Loading landscape…</div>');
    try {
        const res = await fetch(`${API}/landscape`);
        landscapeData = await res.json();
        populateLsFilter();
        renderLandscape();
    } catch(e) {
        wrap.innerHTML = `<div class="placeholder error-msg">Failed to load landscape: ${esc(e.message)}</div>`;
    } finally {
        document.getElementById('lsLoading')?.remove();
    }
}

function populateLsFilter() {
    const sel = document.getElementById('lsProjectFilter');
    sel.innerHTML = '<option value="__all__">All projects</option>';
    (landscapeData.projects || []).forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = `${p.path} (${p.pipelineCount})`;
        sel.appendChild(opt);
    });
}

document.getElementById('lsProjectFilter').addEventListener('change', renderLandscape);
document.getElementById('lsShowTasks').addEventListener('change', renderLandscape);
document.getElementById('lsShowExternal').addEventListener('change', renderLandscape);

function renderLandscape() {
    if (!landscapeData) return;

    const projectFilter = document.getElementById('lsProjectFilter').value;
    const showTasks = document.getElementById('lsShowTasks').checked;
    const showExternal = document.getElementById('lsShowExternal').checked;

    // Filter nodes
    let nodes = landscapeData.nodes.filter(n => {
        if (!showTasks && n.type === 'task') return false;
        if (!showExternal && n.type === 'external') return false;
        if (projectFilter !== '__all__' && n.project !== projectFilter) {
            // Also include targets of edges from filtered project
            const isTarget = landscapeData.edges.some(e => {
                const src = landscapeData.nodes.find(nn => nn.id === e.source);
                return src && src.project === projectFilter && e.target === n.id;
            });
            if (!isTarget) return false;
        }
        return true;
    });

    const nodeIds = new Set(nodes.map(n => n.id));
    let edges = landscapeData.edges.filter(e => nodeIds.has(e.source) && nodeIds.has(e.target));

    // Project color map
    const projectList = [...new Set(nodes.map(n => n.project))].sort();
    const projectColor = {};
    projectList.forEach((p, i) => { projectColor[p] = PROJECT_COLORS[i % PROJECT_COLORS.length]; });

    // Stats
    document.getElementById('lsStats').textContent = `${nodes.length} nodes · ${edges.length} edges · ${projectList.length} projects`;

    // Legend
    const legend = document.getElementById('lsLegend');
    legend.innerHTML = '<div class="ls-legend-title">Projects</div>' +
        projectList.map(p => `<div class="ls-legend-row"><div class="ls-legend-dot" style="background:${projectColor[p]}"></div>${p}</div>`).join('') +
        '<div class="ls-legend-title" style="margin-top:6px">Types</div>' +
        '<div class="ls-legend-row"><div class="ls-legend-dot" style="background:#5b9aff"></div>Pipeline (.slp)</div>' +
        '<div class="ls-legend-row"><div class="ls-legend-dot" style="background:#c77dff;border-radius:2px"></div>Task (.slt)</div>' +
        '<div class="ls-legend-row"><div class="ls-legend-dot" style="border:1px dashed #888;background:transparent"></div>External ref</div>';

    // SVG setup with D3
    const svg = d3.select('#lsSvg');
    svg.selectAll('*').remove();
    const wrap = document.getElementById('lsWrap');
    const W = wrap.clientWidth;
    const H = wrap.clientHeight;
    svg.attr('viewBox', `0 0 ${W} ${H}`);

    // Arrow marker
    const defs = svg.append('defs');
    defs.append('marker').attr('id','ls-arrow').attr('viewBox','0 0 10 7')
        .attr('refX',20).attr('refY',3.5).attr('markerWidth',7).attr('markerHeight',5)
        .attr('orient','auto')
        .append('path').attr('d','M0,0 L10,3.5 L0,7 Z').attr('fill','#555');

    const g = svg.append('g');
    const zoomBehavior = d3.zoom().scaleExtent([0.05, 5]).on('zoom', e => g.attr('transform', e.transform));
    svg.call(zoomBehavior);

    // Simulation nodes/edges (clone to avoid mutating source)
    const simNodes = nodes.map(n => ({...n}));
    const simEdges = edges.map(e => ({source: e.source, target: e.target, label: e.label, rawRef: e.rawRef, params: e.params}));

    const simulation = d3.forceSimulation(simNodes)
        .force('link', d3.forceLink(simEdges).id(d => d.id).distance(120).strength(0.6))
        .force('charge', d3.forceManyBody().strength(-350))
        .force('center', d3.forceCenter(W / 2, H / 2))
        .force('collision', d3.forceCollide().radius(40))
        .force('x', d3.forceX(W / 2).strength(0.03))
        .force('y', d3.forceY(H / 2).strength(0.03));

    // Draw edges
    const link = g.selectAll('.ls-edge').data(simEdges).enter().append('line')
        .attr('class', d => {
            const src = simNodes.find(n => n.id === (typeof d.source === 'object' ? d.source.id : d.source));
            return 'ls-edge' + (src?.type === 'task' ? ' task-edge' : '');
        })
        .attr('stroke', d => {
            const src = simNodes.find(n => n.id === (typeof d.source === 'object' ? d.source.id : d.source));
            return projectColor[src?.project] || '#555';
        })
        .attr('stroke-width', 1.5)
        .attr('marker-end', 'url(#ls-arrow)')
        .on('click', (ev, d) => showLsEdgeDetail(d));

    // Draw nodes
    const node = g.selectAll('.ls-node').data(simNodes).enter().append('g')
        .attr('class', 'ls-node')
        .call(d3.drag()
            .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
            .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
            .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
        )
        .on('click', (ev, d) => showLsNodeDetail(d, simEdges));

    node.each(function(d) {
        const el = d3.select(this);
        const color = projectColor[d.project] || '#888';
        if (d.type === 'task') {
            el.append('rect').attr('x', -8).attr('y', -8).attr('width', 16).attr('height', 16)
                .attr('rx', 3).attr('fill', color + '44').attr('stroke', color).attr('stroke-width', 2);
        } else if (d.type === 'external') {
            el.append('circle').attr('r', 8)
                .attr('fill', 'transparent').attr('stroke', '#888')
                .attr('stroke-dasharray', '3,2').attr('stroke-width', 1.5);
        } else {
            el.append('circle').attr('r', 10)
                .attr('fill', color + '44').attr('stroke', color).attr('stroke-width', 2);
        }
    });

    node.append('text')
        .attr('dy', -14).attr('text-anchor', 'middle')
        .text(d => truncate(d.name, 35));

    // Tick
    simulation.on('tick', () => {
        link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        node.attr('transform', d => `translate(${d.x},${d.y})`);
    });
}

function showLsNodeDetail(d, allEdges) {
    const panel = document.getElementById('lsDetailPanel');
    panel.classList.add('open');
    const outEdges = allEdges.filter(e => (typeof e.source === 'object' ? e.source.id : e.source) === d.id);
    const inEdges = allEdges.filter(e => (typeof e.target === 'object' ? e.target.id : e.target) === d.id);

    let h = `<h3>${esc(d.name)}</h3>`;
    h += row('Type', `<span class="badge" style="background:#222;color:${d.type==='task'?'#c77dff':d.type==='external'?'#888':'#5b9aff'}">${d.type}</span>`);
    h += row('Project', esc(d.project));
    if (d.filePath) h += row('File', `<code>${esc(d.filePath)}</code>`);

    if (outEdges.length) {
        h += `<div class="detail-row"><div class="detail-label">Calls (${outEdges.length})</div><div class="detail-value">`;
        outEdges.forEach(e => {
            const tgt = typeof e.target === 'object' ? e.target : {name: e.target};
            h += `<div style="margin-bottom:4px">→ <strong>${esc(tgt.name||tgt.id||'')}</strong>`;
            if (e.rawRef) h += ` <span style="color:#555;font-size:0.7rem">(${esc(e.rawRef)})</span>`;
            if (e.params?.length) {
                h += `<div style="margin-left:1rem;color:#888;font-size:0.7rem">${e.params.map(p=>esc(p.name)).join(', ')}</div>`;
            }
            h += `</div>`;
        });
        h += `</div></div>`;
    }

    if (inEdges.length) {
        h += `<div class="detail-row"><div class="detail-label">Called by (${inEdges.length})</div><div class="detail-value">`;
        inEdges.forEach(e => {
            const src = typeof e.source === 'object' ? e.source : {name: e.source};
            h += `<div>← <strong>${esc(src.name||src.id||'')}</strong></div>`;
        });
        h += `</div></div>`;
    }

    document.getElementById('lsDetailContent').innerHTML = h;
}

function showLsEdgeDetail(d) {
    const panel = document.getElementById('lsDetailPanel');
    panel.classList.add('open');
    const src = typeof d.source === 'object' ? d.source : {name: d.source};
    const tgt = typeof d.target === 'object' ? d.target : {name: d.target};

    let h = `<h3>Connection</h3>`;
    h += row('From', `<strong>${esc(src.name||'')}</strong>`);
    h += row('To', `<strong>${esc(tgt.name||'')}</strong>`);
    if (d.label) h += row('Snap Label', esc(d.label));
    if (d.rawRef) h += row('Reference', `<code>${esc(d.rawRef)}</code>`);

    if (d.params?.length) {
        h += `<div class="detail-row"><div class="detail-label">Parameters</div><table class="mapping-table"><tr><th>Name</th><th>Value</th></tr>`;
        d.params.forEach(p => { h += `<tr><td><code>${esc(p.name||'')}</code></td><td><code>${esc(String(p.value??''))}</code></td></tr>`; });
        h += `</table></div>`;
    }

    document.getElementById('lsDetailContent').innerHTML = h;
}

function closeLsDetail() {
    document.getElementById('lsDetailPanel').classList.remove('open');
}

loadPipelines();
</script>
